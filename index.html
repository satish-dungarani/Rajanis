<!DOCTYPE html>
<!--
    =====================================================
    RAJANI SUPERSTORE LTD - TIME SHEET MANAGEMENT SYSTEM
    =====================================================
    VERSION: 1.0.6
    DATE: Stable Release
    
    FEATURES:
    - Dark Theme UI
    - Employee Portal (Clock In/Out)
    - Admin Panel (Dashboard, Employees, Reports, Settings)
    - Firebase Cloud Sync
    - Factory Reset (Local + Cloud wipe)
    - Professional Modal/Toast notifications
    - Employee Self Registration (QR-based)
    - Multiple Clock In/Out per day
    - Backup & Restore
    - Location Restriction (IP + GPS)
    
    RESTORE POINT: This is the stable version.
    Keep a backup of this file as "index-v1.0.5.html"
    =====================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Sheet Management</title>
    <link id="brand-favicon" rel="icon" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --theme-primary: #4f46e5;
            --theme-primary-hover: #4338ca;
            --theme-secondary: #0f172a;
            --theme-accent: #3b82f6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card-light {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-left: 3px solid var(--theme-accent);
        }
        .sidebar-sublink.active {
            color: #ffffff !important;
            background: rgba(255, 255, 255, 0.1);
        }
        .emp-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .emp-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-dark {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        select.input-dark, select#sr-gender, select#sr-role, select#emp-gender {
            /* Match other inputs: soft dark background with light text */
            background-color: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
        }
        select.input-dark option {
            /* Dropdown list: light background with dark text for readability */
            background-color: #e5e7eb;
            color: #020617;
        }
        .input-dark:focus {
            outline: none;
            border-color: var(--theme-accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .input-dark::placeholder { color: rgba(255, 255, 255, 0.4); }
        .btn-primary {
            background: linear-gradient(135deg, var(--theme-primary), var(--theme-accent));
            transition: all 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .table-dark th { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.7); }
        .table-dark td { color: rgba(255, 255, 255, 0.9); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .table-dark tr:hover td { background: rgba(255, 255, 255, 0.03); }
        .badge-green { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .badge-red { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-amber { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-blue { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-gray { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.6); }
        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.open { max-height: 1000px; }
        .modal-overlay { animation: modalFadeIn 0.2s ease-out; }
        @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-panel { animation: modalSlideIn 0.3s ease-out; }
        @keyframes modalSlideIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .toast { animation: toastSlideIn 0.3s ease-out; }
        @keyframes toastSlideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="text-white">

    <div id="app-root" class="min-h-screen"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2"></div>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-[9998] hidden">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm modal-overlay"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div id="modal-content" class="modal-panel"></div>
        </div>
    </div>

    <!-- Global Loader -->
    <div id="global-loader" class="fixed inset-0 z-[9997] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="glass-card rounded-2xl px-6 py-4 flex items-center gap-3">
                <i data-lucide="loader" class="w-5 h-5 animate-spin text-[var(--theme-accent)]"></i>
                <span id="global-loader-text" class="text-sm">Processing...</span>
            </div>
        </div>
    </div>

    <!-- HOME -->
    <template id="view-home">
        <div class="min-h-screen flex flex-col fade-in relative overflow-hidden">
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute -top-40 -left-40 w-96 h-96 bg-[var(--theme-primary)] rounded-full blur-3xl opacity-20"></div>
                <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-[var(--theme-accent)] rounded-full blur-3xl opacity-20"></div>
            </div>
            <header class="relative z-10 p-6 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="home-logo-container" class="w-12 h-12 rounded-xl border border-white/10 flex items-center justify-center"></div>
                    <div>
                        <h1 id="home-brand-name" class="text-xl font-bold"></h1>
                        <p id="home-brand-tagline" class="text-xs text-white/50"></p>
                    </div>
                </div>
                <div id="home-clock" class="font-mono text-lg bg-white/10 px-4 py-2 rounded-lg">--:--</div>
            </header>
            <main class="relative z-10 flex-grow flex flex-col items-center justify-center p-6">
                <div class="text-center mb-12">
                    <h2 class="text-3xl md:text-4xl font-medium mb-2 text-white/70">Welcome To</h2>
                    <h1 id="home-welcome-brand" class="text-4xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-[var(--theme-accent)] via-white to-[var(--theme-primary)] bg-clip-text text-transparent"></h1>
                    <p class="text-white/50 text-lg">Select your portal to continue</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
                    <button onclick="app.enterEmployeePortal()" class="group glass-card p-8 rounded-2xl text-left hover:border-[var(--theme-accent)] transition-all duration-300">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500/20 to-blue-600/20 flex items-center justify-center mb-6 group-hover:from-blue-500 group-hover:to-blue-600 transition-all">
                            <i data-lucide="users" class="w-8 h-8 text-blue-400 group-hover:text-white transition-colors"></i>
                        </div>
                        <h3 class="text-2xl font-bold mb-2">Employee Portal</h3>
                        <p class="text-white/50">Clock in and out for your shift</p>
                    </button>
                    <button onclick="app.navigate('admin-login')" class="group glass-card p-8 rounded-2xl text-left hover:border-[var(--theme-primary)] transition-all duration-300">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500/20 to-purple-600/20 flex items-center justify-center mb-6 group-hover:from-indigo-500 group-hover:to-purple-600 transition-all">
                            <i data-lucide="shield" class="w-8 h-8 text-indigo-400 group-hover:text-white transition-colors"></i>
                        </div>
                        <h3 class="text-2xl font-bold mb-2">Admin Console</h3>
                        <p class="text-white/50">Manage staff and view reports</p>
                    </button>
                </div>
            </main>
            <footer class="relative z-10 p-6 text-center text-white/30 text-sm">
                © <span id="home-year"></span> <span id="home-footer-brand"></span>. All rights reserved.
            </footer>
        </div>
    </template>

    <!-- EMPLOYEE LIST -->
    <template id="view-employee-list">
        <div class="min-h-screen flex flex-col fade-in">
            <!-- Sticky header so search stays visible while scrolling -->
            <header class="sticky top-0 z-20 backdrop-blur-xl bg-slate-950/40 border-b border-white/10">
                <div class="px-6 py-5 max-w-5xl mx-auto">
                    <div class="flex items-center gap-3">
                        <button onclick="app.navigate('home')" class="p-2 rounded-lg hover:bg-white/10 transition">
                            <i data-lucide="arrow-left" class="w-6 h-6"></i>
                        </button>
                        <div class="flex-1 text-center">
                            <h1 class="text-xl sm:text-2xl font-bold">Choose your profile</h1>
                            <p class="text-white/50 text-sm">Tap your name to clock in / out</p>
                        </div>

                        <!-- Real-time counters (active employees only) - stacked -->
                        <div class="flex flex-col gap-1 items-end">
                            <div class="flex items-center justify-between gap-2 px-2.5 py-1 rounded-lg bg-green-500/20 border border-green-500/30 min-w-[82px]">
                                <span class="text-green-400/70 text-[10px] uppercase font-semibold">In</span>
                                <span id="list-count-in" class="text-green-400 font-bold text-xs">0</span>
                            </div>
                            <div class="flex items-center justify-between gap-2 px-2.5 py-1 rounded-lg bg-slate-500/20 border border-slate-500/30 min-w-[82px]">
                                <span class="text-slate-200/70 text-[10px] uppercase font-semibold">Out</span>
                                <span id="list-count-out" class="text-slate-200 font-bold text-xs">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4">
                        <div class="relative max-w-md mx-auto">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
                            <input type="text" id="emp-search" placeholder="Search by name or role..." class="w-full input-dark rounded-xl py-3 pl-12 pr-4" onkeyup="app.filterEmployeeCards()">
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-grow px-6 pb-6 pt-6 overflow-auto">
                <div id="employee-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto"></div>
                <p id="no-employees-msg" class="hidden text-center text-white/40 py-12">No employees found</p>
            </main>
        </div>
    </template>

    <!-- EMPLOYEE ACTION -->
    <template id="view-employee-action">
        <div class="min-h-screen flex flex-col fade-in relative">
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-[var(--theme-primary)] rounded-full blur-3xl opacity-10"></div>
            </div>
            <header class="relative z-10 p-6 flex items-center justify-between">
                <button onclick="app.navigate('employee-list')" class="flex items-center gap-2 text-white/60 hover:text-white transition">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span>Back to Profiles</span>
                </button>

            </header>
            <main class="relative z-10 flex-grow flex items-center justify-center p-6">
                <div class="glass-card rounded-3xl p-8 w-full max-w-sm text-center">
                    <div class="relative inline-block mb-6">
                        <div class="w-32 h-32 rounded-full p-1 bg-gradient-to-br from-[var(--theme-primary)] to-[var(--theme-accent)]">
                            <img id="action-photo" src="" class="w-full h-full rounded-full object-cover bg-slate-800">
                        </div>
                        <div id="action-status-dot" class="absolute bottom-2 right-2 w-6 h-6 rounded-full border-4 border-slate-800"></div>
                    </div>
                    <h2 id="action-name" class="text-2xl font-bold mb-1">Employee Name</h2>
                    <p id="action-role" class="text-white/50 mb-6">Role</p>
                    <div class="glass-card-light rounded-xl p-4 mb-6 text-left">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-white/50 text-sm">Status</span>
                            <span id="action-status-badge" class="px-3 py-1 rounded-full text-xs font-bold">--</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-white/50 text-sm">Last Activity</span>
                            <span id="action-last-activity" class="text-sm font-mono">--</span>
                        </div>
                    </div>
                    <button id="action-btn" class="w-full py-4 rounded-xl font-bold text-lg transition-all active:scale-95"></button>
                    <div class="mt-6 flex items-center justify-center gap-2 text-white/40">
                        <i data-lucide="clock" class="w-4 h-4"></i>
                        <span id="action-live-clock" class="font-mono">--:--:--</span>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <!-- EMPLOYEE SELF REGISTRATION (for QR link) -->
    <template id="view-employee-register">
        <div class="min-h-screen flex items-center justify-center p-6 fade-in relative">
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute -top-40 -left-40 w-96 h-96 bg-[var(--theme-primary)] rounded-full blur-3xl opacity-20"></div>
                <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-[var(--theme-accent)] rounded-full blur-3xl opacity-20"></div>
            </div>
            <div class="relative z-10 w-full max-w-lg">
                <div class="glass-card rounded-3xl p-6 md:p-8 shadow-2xl">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div id="sr-brand-logo-container" class="w-10 h-10 rounded-lg border border-white/10 flex items-center justify-center"></div>
                            <div>
                                <h2 id="sr-brand-name" class="text-lg font-semibold"></h2>
                                <p class="text-white/50 text-xs">Employee Details Form</p>
                            </div>
                        </div>
                    </div>
                    <form onsubmit="app.selfRegisterEmployee(event)" class="space-y-4 mt-2">
                        <div>
                            <label class="block text-white/60 text-xs mb-1">Full Name *</label>
                            <input id="sr-name" type="text" required class="w-full input-dark rounded-lg px-3 py-2 text-sm" placeholder="Your full name">
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="block text-white/60 text-xs mb-1">Gender</label>
                                <select id="sr-gender" class="w-full input-dark rounded-lg px-3 py-2 text-sm">
                                    <option value="">Select</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                            </div>
                            <div class="col-span-2">
                                <label class="block text-white/60 text-xs mb-1">Job Role *</label>
                                <select id="sr-role" required class="w-full input-dark rounded-lg px-3 py-2 text-sm">
                                    <option value="">Select role</option>
                                    <option value="Shop Floor Assistant">Shop Floor Assistant</option>
                                    <option value="Till Operative">Till Operative</option>
                                    <option value="Online">Online</option>
                                    <option value="Admin">Admin</option>
                                    <option value="Security">Security</option>
                                    <option value="Cleaning & Hygiene In charge">Cleaning & Hygiene In charge</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-white/60 text-xs mb-1">Mobile *</label>
                                <input id="sr-mobile" type="tel" required class="w-full input-dark rounded-lg px-3 py-2 text-sm" placeholder="Your mobile number">
                            </div>
                            <div>
                                <label class="block text-white/60 text-xs mb-1">Email</label>
                                <input id="sr-email" type="email" class="w-full input-dark rounded-lg px-3 py-2 text-sm" placeholder="Optional">
                            </div>
                        </div>
                        <div>
                            <label class="block text-white/60 text-xs mb-1">Regular Off Days (if any)</label>
                            <div class="flex flex-wrap gap-2 text-xs">
                                <label class="flex items-center gap-1"><input type="checkbox" id="sr-off-0" class="rounded"> Sun</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="sr-off-1" class="rounded"> Mon</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="sr-off-2" class="rounded"> Tue</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="sr-off-3" class="rounded"> Wed</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="sr-off-4" class="rounded"> Thu</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="sr-off-5" class="rounded"> Fri</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="sr-off-6" class="rounded"> Sat</label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-white/60 text-xs mb-1">Photo *</label>
                            <div class="flex items-center gap-4">
                                <img id="sr-photo-preview" src="https://api.dicebear.com/9.x/toon-head/svg?seed=Christopher" class="w-16 h-16 rounded-full bg-slate-700 object-cover">
                                <div class="flex-grow space-y-2">
                                    <input type="file" id="sr-photo-file" accept="image/*" class="hidden" onchange="app.handleSelfPhotoUpload(event)">
                                    <button type="button" onclick="document.getElementById('sr-photo-file').click()" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-xs transition">Upload</button>
                                    <p class="text-white/30 text-xs">Please upload a clear profile photo (required).</p>
                                </div>
                            </div>
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="w-full py-2.5 btn-primary rounded-lg text-sm font-semibold">Submit Details</button>
                        </div>
                    </form>
                    <p class="mt-3 text-[11px] text-white/40 text-center">By submitting this form you confirm the information is accurate.</p>
                </div>
            </div>
        </div>
    </template>

    <!-- ADMIN LOGIN -->
    <template id="view-admin-login">
        <div class="min-h-screen flex items-center justify-center p-6 fade-in">
            <div class="glass-card rounded-2xl w-full max-w-sm overflow-hidden">
                <div class="bg-gradient-to-r from-[var(--theme-primary)] to-[var(--theme-accent)] p-8 text-center">
                    <div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="shield-check" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-bold">Admin Access</h2>
                    <p class="text-white/70 text-sm mt-1">Enter your credentials</p>
                </div>
                <form onsubmit="app.handleAdminLogin(event)" class="p-6">
                    <div class="mb-4">
                        <label class="block text-white/60 text-sm mb-2">Password</label>
                        <input type="password" id="admin-password" class="w-full input-dark rounded-lg px-4 py-3" placeholder="Enter password">
                    </div>
                    <p id="login-error" class="text-red-400 text-sm mb-4 hidden">Incorrect password</p>
                    <button type="submit" class="w-full btn-primary py-3 rounded-lg font-bold">Login</button>
                    <button type="button" onclick="app.navigate('home')" class="w-full mt-3 py-2 text-white/50 hover:text-white transition">Cancel</button>
                </form>
            </div>
        </div>
    </template>

    <!-- ADMIN LAYOUT -->
    <template id="view-admin-layout">
        <div class="min-h-screen flex">
            <!-- Sidebar -->
            <aside id="admin-sidebar" class="w-64 bg-slate-900 border-r border-white/10 flex-col hidden md:flex">
                <div class="p-6 border-b border-white/10">
                    <div class="flex items-center gap-3">
                        <div id="sidebar-logo" class="w-10 h-10 rounded-lg border border-white/10 flex items-center justify-center"></div>
                        <div>
                            <h1 id="sidebar-brand" class="font-bold"></h1>
                            <p id="sidebar-tagline" class="text-white/40 text-xs"></p>
                        </div>
                    </div>
                </div>
                <nav class="flex-grow p-4 space-y-1">
                    <button onclick="app.loadAdminView('dashboard')" id="nav-dashboard" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                        <span>Dashboard</span>
                    </button>
                    <button onclick="app.loadAdminView('employees')" id="nav-employees" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition">
                        <i data-lucide="users" class="w-5 h-5"></i>
                        <span>Employees</span>
                    </button>
                    <div>
                        <button onclick="app.toggleReportsMenu()" id="nav-reports" class="sidebar-link w-full flex items-center justify-between px-4 py-3 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition">
                            <span class="flex items-center gap-3">
                                <i data-lucide="file-text" class="w-5 h-5"></i>
                                <span>Reports</span>
                            </span>
                            <i id="reports-chevron" data-lucide="chevron-down" class="w-4 h-4 transition-transform"></i>
                        </button>
                        <div id="reports-submenu" class="ml-4 mt-1 space-y-1 hidden">
                            <button onclick="app.loadAdminView('reports-activity')" id="nav-reports-activity" class="sidebar-sublink w-full flex items-center gap-3 px-4 py-2 rounded-lg text-white/50 hover:text-white hover:bg-white/5 transition text-sm">

    <script>
    const app = {
        data: {
            employees: [],
            history: [],
            selectedEmployeeId: null,
            adminView: 'dashboard',
            tempPhoto: null,
            currentTheme: 'blue',
            supabase: null,
            isResetting: false,
            locationSettings: null,
            currentIP: null,
            employeesPage: 1,
            employeesPageSize: 10,
            employeesSort: { sortKey: 'name', sortDir: 'asc' },
            gpsRestrictionEnabled: false,
            ipRestrictionEnabled: false,
            backups: [],
            employeesLoaded: false,
            pinVerificationEnabled: true,
            cameraVerificationEnabled: false,
            activityPage: 1,
            activityPageSize: 50,
            activitySearch: '',
            adminPasswordHash: null,
            photoMap: {},
            listenersAttached: false,
            idleTimer: null,
            idleTimeoutMs: 7 * 60 * 1000,
            settingsLoaded: false,
            isClockActionRunning: false,
            errorLogs: []
        },

        // Supabase (default data source)
        getSupabaseConfig() {
            const url = 'https://itxqovvmersuxiekrsce.supabase.co';
            const key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eHFvdnZtZXJzdXhpZWtyc2NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY1NDgsImV4cCI6MjA4ODM4MjU0OH0.5rt2jP6Xo-m_X1Bs1vVKvfWDnmFtrUwMMsflwZHosNE';
            return { url, key };
        },

        // Data adapter: Supabase primary
        getDataSource() {
            return this.data.supabase ? 'supabase' : 'none';
        },

        async dbReadEmployeesAndHistory() {
            const src = this.getDataSource();
            if (src === 'supabase') {
                this.showLoader('Loading data...');
                try {
                    const { data: employees, error: empErr } = await this.data.supabase.from('employees').select('*');
                    if (empErr) throw empErr;
                    const { data: history, error: histErr } = await this.data.supabase.from('history').select('*').order('timestamp', { ascending: false });
                    if (histErr) throw histErr;
                    return { employees: (employees || []).map(this.mapEmployeeFromDB), history: (history || []).map(this.mapHistoryFromDB) };
                } catch (e) {
                    this.logError('dbReadEmployeesAndHistory', e);
                    throw e;
                } finally {
                    this.hideLoader();
                }
            }
            return { employees: [], history: [] };
        },

        async syncEmployeesToSupabase() {
            if (!this.data.supabase) return;
            const rows = this.data.employees.map(e => this.mapEmployeeToDB(e));
            const { error } = await this.data.supabase.from('employees').upsert(rows, { onConflict: 'id' });
            if (error) {
                console.error('Supabase employees sync error:', error);
                this.uiToast('Failed to sync employees to database', 'error');
            }
        },

        async appendHistoryToSupabase(record) {
            if (!this.data.supabase || !record) return;
            const { error } = await this.data.supabase.from('history').insert(this.mapHistoryToDB(record));
            if (error) {
                console.error('Supabase history append error:', error);
                this.uiToast('Failed to save clock record', 'error');
            }

        async checkLocationRestriction() {
            const settings = this.data.locationSettings;
            const gpsEnabled = this.data.gpsRestrictionEnabled;
            const ipEnabled = this.data.ipRestrictionEnabled;

            if (!settings || (!gpsEnabled && !ipEnabled)) {
                return { allowed: true };
            }

            let ipMatch = !ipEnabled;
            let gpsMatch = !gpsEnabled;
            let failureReasons = [];

            // IP check (if enabled)
            if (ipEnabled) {
                if (settings.storeIP) {
                    try {
                        const response = await fetch('https://api.ipify.org?format=json');
                        const data = await response.json();
                        const currentIP = data.ip;
                        if (currentIP === settings.storeIP) {
                            ipMatch = true;
                        } else {
                            failureReasons.push('🏠 You need to be on the store network to clock in.');
                        }
                    } catch (e) {
                        console.error('IP check failed:', e);
                        failureReasons.push('🔌 Could not verify network. Please try again.');
                    }
                } else {
                    failureReasons.push('⚙️ Store IP not set. Please contact your manager.');
                }
            }

            // GPS check (if enabled)
            if (gpsEnabled) {
                if (settings.latitude && settings.longitude) {
                    try {
                        await new Promise((resolve) => {
                            if (!navigator.geolocation) {
                                failureReasons.push('📱 GPS not supported on this device.');
                                resolve();
                                return;
                            }

                            navigator.geolocation.getCurrentPosition(
                                (position) => {
                                    const distance = this.calculateDistance(
                                        position.coords.latitude,
                                        position.coords.longitude,
                                        parseFloat(settings.latitude),
                                        parseFloat(settings.longitude)
                                    );
                                    if (distance <= (settings.radius || 100)) {
                                        gpsMatch = true;
                                    } else {
                                        failureReasons.push('📍 You appear to be outside the store GPS area.');
                                    }
                                    resolve();
                                },
                                () => {
                                    failureReasons.push('📱 GPS could not be verified. Enable location and try again.');
                                    resolve();
                                },
                                { enableHighAccuracy: true, timeout: 10000 }
                            );
                        });
                    } catch (e) {
                        failureReasons.push('🛰️ GPS error. Please try again.');
                    }
                } else {
                    failureReasons.push('⚙️ Store GPS not set. Please contact your manager.');
                }
            }

            if (ipMatch && gpsMatch) {
                return { allowed: true };
            }
            return { allowed: false, reason: failureReasons.join('\n') };
        },

        calculateDistance(lat1, lon1, lat2, lon2) {
            // Haversine formula
            const R = 6371e3; // Earth's radius in meters
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; // Distance in meters
        },

                            Verification Photo
                        </h3>
                        <p class="text-white/60 text-sm mb-4">Please look at the camera and click Capture.</p>
                        <div class="relative rounded-lg overflow-hidden bg-black mb-4">
                            <video id="camera-preview" autoplay playsinline class="w-full h-64 object-cover"></video>
                            <canvas id="camera-canvas" class="hidden"></canvas>
                        </div>
                        <div id="camera-error" class="hidden p-3 rounded-lg bg-red-500/20 text-red-400 text-sm mb-4">
                            <i data-lucide="alert-circle" class="w-4 h-4 inline mr-1"></i>
                            <span>Camera access denied or not available</span>
                        </div>
                        <div class="flex gap-3">
                            <button type="button" id="camera-cancel" class="flex-1 py-2 bg-white/10 hover:bg-white/20 rounded-lg transition">Cancel</button>
                            <button type="button" id="camera-capture" class="flex-1 py-2 bg-green-500 hover:bg-green-600 rounded-lg font-medium transition flex items-center justify-center gap-2">
                                <i data-lucide="camera" class="w-4 h-4"></i> Capture
                            </button>
                        </div>
                    </div>
                `;
                container.classList.remove('hidden');
                lucide.createIcons();

                const video = document.getElementById('camera-preview');
                const canvas = document.getElementById('camera-canvas');
                const btnCapture = document.getElementById('camera-capture');
                const btnCancel = document.getElementById('camera-cancel');
                const errorDiv = document.getElementById('camera-error');
                let stream = null;

                const stopCamera = () => {
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                        stream = null;
                    }
                };

                const close = (result) => {
                    stopCamera();
                    container.classList.add('hidden');
                    content.innerHTML = '';
                    resolve(result);
                };

                // Start camera
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
                    audio: false 
                })
                .then(s => {
                    stream = s;
                    video.srcObject = stream;
                })
                .catch(err => {
                    console.error('Camera error:', err);
                    errorDiv.classList.remove('hidden');
                    btnCapture.disabled = true;
                    btnCapture.classList.add('opacity-50', 'cursor-not-allowed');
                });

                btnCancel.onclick = () => close(null);

                btnCapture.onclick = () => {
                    if (!stream) return close(null);
                    
                    // Set canvas size (small for storage efficiency)
                    const maxSize = 160;
                    canvas.width = maxSize;
                    canvas.height = maxSize;
                    
                    const ctx = canvas.getContext('2d');
                    // Draw video frame to canvas (cropped square)
                    const vw = video.videoWidth;
                    const vh = video.videoHeight;
                    const size = Math.min(vw, vh);
                    const sx = (vw - size) / 2;
                    const sy = (vh - size) / 2;
                    ctx.drawImage(video, sx, sy, size, size, 0, 0, maxSize, maxSize);
                    
                    // Compress to JPEG with low quality for minimal storage
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
                    close(dataUrl);
                };
            });
        },

        async saveData() {

            this.showLoader('Saving...');
            try {
                // Upsert employees (mapped to DB schema)
                if (this.data.employees.length) {
                    const rows = this.data.employees.map(e => this.mapEmployeeToDB(e));
                    const { error } = await this.data.supabase.from('employees').upsert(rows, { onConflict: 'id' });

        // BACKUP & RESTORE
        async createBackup() {
            if (!this.data.db) {
                this.uiAlert('Firebase not connected. Cannot create backup.');
                return;
            }
            try {
                const snapshot = await this.data.dbRef.get();
                const data = snapshot.val() || {};
                const timestamp = new Date().toISOString();
                const backupId = `backup_${timestamp.replace(/[:.]/g, '-')}`;

                const backupObj = { id: backupId, timestamp, data };

                // Save FULL backup (metadata + data) to Firebase
                await this.data.db.ref('rajani_backups').push(backupObj);

                // Also trigger file download for admin
                const blob = new Blob([JSON.stringify(backupObj, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${backupId}.json`;
                a.click();
                URL.revokeObjectURL(url);

                this.uiToast('Backup created and downloaded', 'success');

                // Refresh backup list UI
                this.loadBackups();
            } catch (e) {
                console.error('Backup error', e);
                this.uiAlert('Failed to create backup');
            }
        },

        async loadBackups() {
            if (!this.data.db) return;
            try {
                const snapshot = await this.data.db.ref('rajani_backups').orderByChild('timestamp').once('value');
                const val = snapshot.val() || {};
                // Preserve Firebase keys so we can reference specific backups
                const list = Object.entries(val)
                    .map(([key, obj]) => ({ ...obj, _key: key }))
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                this.data.backups = list;
                this.renderBackups();
            } catch (e) {
                console.error('Load backups error', e);
            }
        },

        renderBackups() {
            const tbody = document.getElementById('backup-list');
            if (!tbody) return;
            tbody.innerHTML = '';
            if (!this.data.backups || this.data.backups.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="px-3 py-2 text-white/40 text-center text-xs">No backups yet</td></tr>';
                return;
            }
            this.data.backups.forEach(b => {
                const d = new Date(b.timestamp);
                const dateStr = d.toLocaleDateString('en-GB');
                const timeStr = d.toLocaleTimeString();
                tbody.innerHTML += `
                    <tr>
                        <td class="px-3 py-1">${dateStr}</td>
                        <td class="px-3 py-1">${timeStr}</td>
                        <td class="px-3 py-1 text-right space-x-1">
                            <button class="px-2 py-0.5 bg-white/10 hover:bg-white/20 rounded text-[10px]" onclick="app.downloadBackupFromCloud('${b._key}')">Download</button>
                            <button class="px-2 py-0.5 bg-red-500/20 hover:bg-red-500/30 text-red-300 rounded text-[10px]" onclick="app.confirmRestoreFromCloud('${b._key}')">Restore</button>
                        </td>
                    </tr>`;
            });
        },

        async downloadBackupFromCloud(backupKey) {
            if (!this.data.db) return;
            try {
                const snapshot = await this.data.db.ref('rajani_backups').child(backupKey).get();
                const backupObj = snapshot.val();
                if (!backupObj || !backupObj.data) {
                    this.uiAlert('Backup data not found');
                    return;
                }
                const blob = new Blob([JSON.stringify(backupObj, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${backupObj.id || backupKey}.json`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                console.error('Download backup error', e);
                this.uiAlert('Failed to download backup');
            }
        },

        confirmRestoreFromCloud(backupKey) {
            this.uiConfirm('Restore from Backup?', 'This will overwrite current employees and history with the selected backup.', async () => {
                await this.restoreFromCloud(backupKey);
            });
        },

        async restoreFromCloud(backupKey) {
            if (!this.data.db) {
                this.uiAlert('Firebase not connected. Cannot restore.');
                return;
            }
            try {
                const snapshot = await this.data.db.ref('rajani_backups').child(backupKey).get();
                const backup = snapshot.val() || {};
                if (!backup.data) {
                    this.uiAlert('Backup contents not found');
                    return;
                }
                const { employees = [], history = [] } = backup.data;
                // Write backup back to main data node
                await this.data.dbRef.set({ employees, history });
                this.data.employees = employees;
                this.data.history = history;
                this.uiToast('Backup restored from cloud', 'success');
                this.loadAdminView(this.data.adminView);
            } catch (e) {
                console.error('Restore error', e);
                this.uiAlert('Failed to restore backup');
            }
        },

        handleBackupImport(evt) {
            const file = evt.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    if (!json || !json.data) {
                        this.uiAlert('Invalid backup file format');
                        return;
                    }
                    const { employees = [], history = [] } = json.data;
                    this.uiConfirm('Restore from File?', 'This will overwrite current employees and history with data from the backup file.', async () => {
                        if (this.data.db) {
                            await this.data.dbRef.set({ employees, history });
                        }
                        this.data.employees = employees;
                        this.data.history = history;
                        this.uiToast('Backup restored from file', 'success');
                        this.loadAdminView(this.data.adminView);
                    });
                } catch (err) {
                    console.error('Import backup error', err);
                    this.uiAlert('Failed to import backup file');
                }
            };
            reader.readAsText(file);
        },

        setupIdleDetection() {

                if (this.data.idleTimer) clearTimeout(this.data.idleTimer);
                this.data.idleTimer = setTimeout(() => {
                    this.detachCoreListeners();
                    this.uiToast('Idle mode: paused sync to save bandwidth', 'info');
                }, this.data.idleTimeoutMs);
                // resume listeners on any activity
                if (!this.data.listenersAttached && this.data.db) {
                    this.attachCoreListeners();
                }
            };
            ['mousemove','keydown','click','scroll','touchstart'].forEach(evt => {
                document.addEventListener(evt, reset, { passive: true });
            });
            reset();
        },

        // AUTO LOGOUT
        checkAutoLogout() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let changed = false;
            this.data.employees.forEach(emp => {
                if (emp.status === 'in' && emp.lastAction) {
                    const lastDate = new Date(emp.lastAction);
                    const lastDay = new Date(lastDate);
                    lastDay.setHours(0, 0, 0, 0);
                    if (lastDay < today) {
                        const closeHour = lastDay.getDay() === 0 ? 16 : 18;
                        const autoTime = new Date(lastDay);
                        autoTime.setHours(closeHour, 0, 0, 0);
                        emp.status = 'out';
                        emp.lastAction = autoTime.toISOString();
                        this.data.history.unshift({
                            employeeId: emp.id,
                            employeeName: emp.name,
                            employeeRole: emp.role,
                            action: 'Auto Clock Out (System)',
                            timestamp: autoTime.toISOString()
                        });
                        changed = true;
                    }
                }
            });
            if (changed) this.saveData();
        },

        // CLOCK
        startClock() {
            const update = () => {
                const now = new Date();
                const time = now.toLocaleTimeString();
                const short = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const homeClock = document.getElementById('home-clock');
                const actionClock = document.getElementById('action-live-clock');
                if (homeClock) homeClock.textContent = short;
                if (actionClock) actionClock.textContent = time;
            };
            update();
            setInterval(update, 1000);
        },

        // DATE HELPERS
        formatDate(d) {
            const date = new Date(d);
            const dd = String(date.getDate()).padStart(2, '0');
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const yyyy = date.getFullYear();
            return `${dd}/${mm}/${yyyy}`;
        },

        formatTime(d) {
            return new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        },

        formatDateTime(d) {
            return this.formatDate(d) + ' ' + this.formatTime(d);
        },

        getWeekStart(d) {
            const date = new Date(d);
            const day = date.getDay();
            date.setDate(date.getDate() - day);
            date.setHours(0, 0, 0, 0);
            return date;
        },

        async clockAction(type) {
            const emp = this.data.employees.find(e => e.id === this.data.selectedEmployeeId);
            if (!emp) return;
            // Prevent inactive employees from clocking in/out
            if (emp.active === false) {
                this.uiAlert('This profile is inactive. Please contact your manager.');
                this.navigate('employee-list');
                return;
            }

            if (this.data.isClockActionRunning) return;
            this.data.isClockActionRunning = true;
            this.showLoader('Saving clock action...');

            const btn = document.getElementById('action-btn');

            // If already in this state, ignore (prevents accidental double clicks)
            if ((type === 'in' && emp.status === 'in') || (type === 'out' && emp.status === 'out')) {
                this.data.isClockActionRunning = false;
                return;
            }

            // Verification based on settings (camera only here)
            let verificationPhoto = null;

            if (this.data.cameraVerificationEnabled) {
                // Camera capture mode
                verificationPhoto = await this.captureVerificationPhoto();
                if (!verificationPhoto) {
                    // User cancelled or camera failed
                    this.hideLoader();
                    this.data.isClockActionRunning = false;
                    return;
                }
            }
            
            // Check location restriction (GPS/IP) only if any restriction is enabled
            if (this.data.gpsRestrictionEnabled || this.data.ipRestrictionEnabled) {
                btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 inline mr-2 animate-spin"></i>Verifying Location...';
                btn.disabled = true;
                btn.className = 'w-full py-4 rounded-xl font-bold text-lg bg-slate-600 cursor-wait';
                lucide.createIcons();

                const locationCheck = await this.checkLocationRestriction();
                
                if (!locationCheck.allowed) {
                    btn.innerHTML = type === 'in' ? '<i data-lucide="log-in" class="w-5 h-5 inline mr-2"></i>Clock In' : '<i data-lucide="log-out" class="w-5 h-5 inline mr-2"></i>Clock Out';
                    btn.disabled = false;

        // Prompt employee for 4-digit PIN and verify against stored pinHash
        promptEmployeePin(emp) {
            return new Promise((resolve) => {
                const container = document.getElementById('modal-container');
                const content = document.getElementById('modal-content');
                if (!container || !content) return resolve(false);

                const title = `Enter PIN for ${emp.name}`;
                content.innerHTML = `
                    <div class="glass-card rounded-2xl p-6 w-full max-w-sm">
                        <h3 class="text-lg font-bold mb-2">${title}</h3>
                        <p class="text-white/60 text-sm mb-4">Please enter your 4-digit password to continue.</p>
                        <div class="mb-4">
                            <label class="block text-white/60 text-xs mb-1">Password (4-digit PIN)</label>
                            <div class="relative">
                                <input id="pin-verify" type="password" inputmode="numeric" maxlength="4" pattern="\\d{4}" class="w-full input-dark rounded-lg px-3 py-2 pr-10 text-sm" placeholder="••••" />
                                <button type="button" id="pin-verify-toggle" class="absolute right-2 top-1/2 -translate-y-1/2 p-1 rounded hover:bg-white/10 text-white/60" title="Show/Hide">
                                    <i id="pin-verify-eye" data-lucide="eye" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <p id="pin-verify-error" class="text-red-400 text-xs mt-2 hidden">Incorrect PIN. Please try again.</p>
                        </div>
                        <div class="flex gap-3">
                            <button type="button" id="pin-cancel" class="flex-1 py-2 bg-white/10 hover:bg-white/20 rounded-lg transition">Cancel</button>
                            <button type="button" id="pin-confirm" class="flex-1 py-2 bg-green-500 hover:bg-green-600 rounded-lg font-medium transition">Confirm</button>
                        </div>
                    </div>
                `;
                container.classList.remove('hidden');
                lucide.createIcons();

                const input = document.getElementById('pin-verify');
                const err = document.getElementById('pin-verify-error');
                const btnConfirm = document.getElementById('pin-confirm');
                const btnCancel = document.getElementById('pin-cancel');
                const btnToggle = document.getElementById('pin-verify-toggle');
                const eye = document.getElementById('pin-verify-eye');

                const close = () => {
                    container.classList.add('hidden');
                    // clear content to avoid stale handlers
                    content.innerHTML = '';
                };

                const verify = () => {
                    const pin = (input?.value || '').trim();
                    // Normalize: keep digits only (helps if user pastes spaces)
                    const normalized = pin.replace(/\s+/g, '');
                    if (!/^\d{4}$/.test(normalized)) {
                        if (err) {
                            err.textContent = 'PIN must be exactly 4 digits.';
                            err.classList.remove('hidden');
                        }
                        return;
                    }
                    const hash = btoa(normalized);
                    const stored = String(emp.pinHash || '').trim();
                    if (hash === stored) {
                        close();
                        return resolve(true);
                    }
                    if (err) {
                        err.textContent = 'Incorrect PIN. Please try again.';
                        err.classList.remove('hidden');
                    }
                    if (input) input.value = '';
                    if (input) input.focus();
                    if (input) input.value = '';
                    if (input) input.focus();
                };

                if (btnCancel) {
                    btnCancel.onclick = () => {
                        close();
                        resolve(false);
                    };
                }
                if (btnConfirm) btnConfirm.onclick = verify;
                if (input) {
                    input.oninput = () => err?.classList.add('hidden');
                    input.onkeydown = (ev) => {
                        if (ev.key === 'Enter') {
                            ev.preventDefault();
                            verify();
                        }
                    };
                    setTimeout(() => input.focus(), 50);
                }
                if (btnToggle && input) {
                    btnToggle.onclick = () => {
                        const hidden = input.type === 'password';
                        input.type = hidden ? 'text' : 'password';
                        if (eye) {
                            eye.setAttribute('data-lucide', hidden ? 'eye-off' : 'eye');
                            lucide.createIcons();
                        }
                    };
                }
            });
        },

        // ADMIN EMPLOYEES (sorting + pagination)
        renderAdminEmployees() {
            const table = document.getElementById('admin-emp-table');
            if (!table) return;

            // Filter
            const search = (document.getElementById('admin-emp-search')?.value || '').toLowerCase();
            const filtered = this.data.employees.filter(emp =>
                emp.name.toLowerCase().includes(search) || emp.role.toLowerCase().includes(search)
            );

            // Sort
            const sort = this.data.employeesSort || { sortKey: 'name', sortDir: 'asc' };
            const sorted = [...filtered].sort((a,b) => {
                const mapVal = (obj, key) => {
                    if (key === 'status') return obj.status === 'in' ? 1 : 0; // in > out
                    if (typeof obj[key] === 'string') return obj[key].toLowerCase();
                    return obj[key] ?? '';
                };
                const va = mapVal(a, sort.sortKey);
                const vb = mapVal(b, sort.sortKey);
                if (va < vb) return sort.sortDir === 'asc' ? -1 : 1;
                if (va > vb) return sort.sortDir === 'asc' ? 1 : -1;
                return 0;
            });

            // Pagination
            const pageSize = this.data.employeesPageSize || 10;
            const total = sorted.length;
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            this.data.employeesPage = Math.min(Math.max(this.data.employeesPage || 1, 1), totalPages);
            const start = (this.data.employeesPage - 1) * pageSize;
            const end = start + pageSize;
            const pageItems = sorted.slice(start, end);

            // Render rows
            table.innerHTML = '';
            pageItems.forEach(emp => {
                const offDays = (emp.offDays || []).map(d => ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d]).join(', ') || '-';
                const contact = [emp.mobile ? '📱' : '', emp.email ? '📧' : ''].filter(Boolean).join(' ') || '-';
                table.innerHTML += `<tr data-name="${emp.name.toLowerCase()}" data-role="${emp.role.toLowerCase()}">
                    <td class="px-4 py-3"><div class="flex items-center gap-3"><img src="${emp.photo}" class="w-10 h-10 rounded-full object-cover bg-slate-700"><span>${emp.name}</span></div></td>
                    <td class="px-4 py-3 text-white/70">${emp.role}</td>
                    <td class="px-4 py-3 text-white/70">${contact}</td>
                    <td class="px-4 py-3"><span class="text-xs text-white/50">${offDays}</span></td>
                    <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-medium ${emp.status === 'in' ? 'badge-green' : 'badge-gray'}">${emp.status === 'in' ? 'In' : 'Out'}</span></td>
                    <td class="px-4 py-3 text-right">
                        <button onclick="app.openEmployeeModal(${emp.id})" class="p-1 hover:bg-white/10 rounded"><i data-lucide="edit" class="w-4 h-4"></i></button>
                        <button onclick="app.confirmDeleteEmployee(${emp.id})" class="p-1 hover:bg-white/10 rounded text-red-400"><i data-lucide='trash-2' class='w-4 h-4'></i></button>
                    </td>
                </tr>`;
            });

            // Footer info
            const rangeEl = document.getElementById('admin-emp-range');
            const pageEl = document.getElementById('admin-emp-page');
            if (rangeEl) rangeEl.textContent = total === 0 ? 'Showing 0-0 of 0' : `Showing ${start + 1}-${Math.min(end, total)} of ${total}`;
            if (pageEl) pageEl.textContent = `${this.data.employeesPage} / ${totalPages}`;
            lucide.createIcons();
        },

        async saveEmployee(e) {
            e.preventDefault();
            this.showLoader('Saving employee...');
            const id = document.getElementById('emp-id').value;
            const name = document.getElementById('emp-name').value.trim();
            const role = document.getElementById('emp-role').value.trim();
            const gender = document.getElementById('emp-gender').value;
            const mobile = document.getElementById('emp-mobile').value.trim();
            const email = document.getElementById('emp-email').value.trim();
            const active = (document.getElementById('emp-active')?.value || 'true') === 'true';
            const displayOrderRaw = document.getElementById('emp-display-order')?.value.trim();
            let displayOrder = displayOrderRaw ? parseInt(displayOrderRaw, 10) : null;
            if (displayOrderRaw) {
                if (isNaN(displayOrder) || displayOrder <= 0) {
                    this.uiAlert('Display Order Number must be a positive number.');
                    return;
                }
            }

            // Password (4-digit numeric). Optional unless you decide to enforce later.
            const pinRaw = (document.getElementById('emp-pin')?.value || '').trim();
            if (pinRaw && !/^\d{4}$/.test(pinRaw)) {
                this.uiAlert('Password must be exactly 4 digits.');
                return;
            }

            // Store securely (existing approach in this client-side system: lightweight obfuscation via Base64).
            // NOTE: This is not cryptographic security, but is consistent with the current project constraints.
            const pinHash = pinRaw ? btoa(pinRaw) : null;

            const offDays = [];
            for (let i = 0; i < 7; i++) {
                if (document.getElementById(`off-${i}`).checked) offDays.push(i);
            }
            const photo = this.data.tempPhoto || this.getDefaultAvatar(gender);
            if (id) {
                const emp = this.data.employees.find(e => e.id === parseInt(id));
                if (emp) {
                    // Keep existing data/history unchanged; only update employee record fields
                    Object.assign(emp, { name, role, gender, mobile, email, photo, offDays, active });
                    if (displayOrderRaw) {
                        emp.displayOrder = displayOrder;
                    } else {
                        delete emp.displayOrder;
                    }

                    // Backward-compatible: only set/replace PIN if provided; if left blank, keep existing.
                    if (pinRaw) {
                        emp.pinHash = pinHash;
                    }

                    // If an employee is set inactive, force them to out (does not touch history)
                    if (emp.active === false) {
                        emp.status = 'out';
                    }
                }
            } else {
                const newId = this.data.employees.length > 0 ? Math.max(...this.data.employees.map(e => e.id)) + 1 : 1;
                const newEmp = { id: newId, name, role, gender, mobile, email, photo, offDays, active, pinHash, status: 'out', lastAction: null };
                if (displayOrderRaw) newEmp.displayOrder = displayOrder;
                this.data.employees.push(newEmp);
            }
            await this.saveData();
            if (this.data.supabase) {
                const rows = this.data.employees.map(e => this.mapEmployeeToDB(e));
                const { error } = await this.data.supabase.from('employees').upsert(rows, { onConflict: 'id' });
                if (error) {
                    console.error('Supabase employees upsert error:', error);
                    this.uiToast('Failed to save employees to database', 'error');
                }
            }
            this.closeEmployeeModal();
            this.renderAdminEmployees();
                this.uiToast('Employee saved!', 'success');
                this.hideLoader();
        },

        // Employee self-registration (QR-based form)
        selfRegisterEmployee(e) {
            e.preventDefault();
            if (!this.data.supabase) {
                this.uiAlert('System is not connected to the server. Please contact your manager.');
                return;
            }
            if (!this.data.employeesLoaded) {
                this.uiAlert('System is still loading. Please wait a few seconds and try again.');
                return;
            }

            const name = document.getElementById('sr-name').value.trim();
            const role = document.getElementById('sr-role').value.trim();
            const gender = document.getElementById('sr-gender').value;
            const mobile = document.getElementById('sr-mobile').value.trim();
            const email = document.getElementById('sr-email').value.trim();
            const offDays = [];
            for (let i = 0; i < 7; i++) {
                if (document.getElementById(`sr-off-${i}`).checked) offDays.push(i);
            }

            // Basic validations
            if (!name || !role) {
                this.uiAlert('Please fill in your full name and job role.');
                return;
            }

            // Name uniqueness check (case-insensitive)
            const exists = this.data.employees.some(emp => emp.name.trim().toLowerCase() === name.toLowerCase());
            if (exists) {
                this.uiAlert('This name already exists in the system. Please contact your manager.');
                return;
            }

            if (!mobile) {
                this.uiAlert('Please enter your mobile number.');
                return;
            }

            if (!this.data.tempPhoto) {
                this.uiAlert('Please upload your profile photo before submitting.');
                return;
            }

            const photo = this.data.tempPhoto;

            const newId = this.data.employees.length > 0
                ? Math.max(...this.data.employees.map(e => e.id || 0)) + 1
                : 1;

            this.data.employees.push({
                id: newId,
                name,
                role,
                gender,
                mobile,
                email,
                photo,
                offDays,
                active: true,
                status: 'out',
                lastAction: null
            });

            this.saveData();
            this.uiToast('Your details have been submitted successfully!', 'success');

            // Clear temporary photo reference
            this.data.tempPhoto = null;

            // Replace form with a simple thank-you screen and attempt to close the tab/window
            const root = document.getElementById('app-root');

                            <p class="text-white/40 text-sm">You can now close this window.</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            }

            // Try to close the tab/window (will only work if it was opened by script)
            setTimeout(() => {
                try { window.close(); } catch (err) { /* ignored */ }
            }, 1000);
        },

        handleSelfPhotoUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 200;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    const preview = document.getElementById('sr-photo-preview');
                    if (preview) preview.src = dataUrl;
                    this.data.tempPhoto = dataUrl;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        },

        // ACTIVITY LOG
        renderActivityLog() {
            const table = document.getElementById('activity-table');
            if (!table) return;

            const pageSize = this.data.activityPageSize || 50;
            const search = (this.data.activitySearch || '').toLowerCase();
            const page = Math.max(1, this.data.activityPage || 1);

            const filtered = this.data.history.filter(h => {
                if (!search) return true;
                const name = (h.employeeName || '').toLowerCase();
                const role = (h.employeeRole || '').toLowerCase();
                const action = (h.action || '').toLowerCase();
                return name.includes(search) || role.includes(search) || action.includes(search);
            });

            const total = filtered.length;
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            this.data.activityPage = Math.min(page, totalPages);

            const start = (this.data.activityPage - 1) * pageSize;
            const end = start + pageSize;
            const pageItems = filtered.slice(start, end);

            const loadingEl = document.getElementById('activity-loading');
            if (loadingEl) loadingEl.classList.remove('hidden');

            table.innerHTML = '';
            if (pageItems.length === 0) {
                table.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-white/40">No activity records</td></tr>';
            } else {
                pageItems.forEach((h) => {
                    const isIn = h.action.includes('In');
                    const isAuto = h.action.includes('Auto');
                    let badgeClass = isIn ? 'badge-green' : 'badge-red';
                    if (isAuto) badgeClass = 'badge-amber';

                    const hasPhoto = !!h.verificationPhoto;
                    const photoCell = hasPhoto
                        ? `<button type="button" onclick="app.viewVerificationPhoto(${this.data.history.indexOf(h)})" class="group">
                               <img src="${h.verificationPhoto}" class="w-10 h-10 rounded-lg object-cover border border-white/10 bg-black/30 group-hover:opacity-90" loading="lazy" />
                           </button>`
                        : '';

                    table.innerHTML += `<tr>
                        <td class="px-4 py-3 text-white/70">${this.formatDate(h.timestamp)}</td>
                        <td class="px-4 py-3 text-white/70">${this.formatTime(h.timestamp)}</td>
                        <td class="px-4 py-3">${h.employeeName}</td>
                        <td class="px-4 py-3 text-white/50">${h.employeeRole || '-'}</td>
                        <td class="px-4 py-3">${photoCell}</td>
                        <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-medium ${badgeClass}">${h.action}</span></td>
                    </tr>`;
                });
            }

            const rangeEl = document.getElementById('activity-range');
            if (rangeEl) {
                rangeEl.textContent = total === 0
                    ? 'Showing 0-0 of 0'
                    : `Showing ${start + 1}-${Math.min(end, total)} of ${total}`;
            }

            this.renderActivityPagination(totalPages);

            if (loadingEl) {
                setTimeout(() => loadingEl.classList.add('hidden'), 150);
            }
        },

        renderActivityPagination(totalPages) {
            const container = document.getElementById('activity-pagination');
            if (!container) return;

            container.innerHTML = '';
            if (totalPages <= 1) return;

            const makeBtn = (label, page, disabled = false, active = false) => {
                const btn = document.createElement('button');
                btn.textContent = label;
                btn.className = `px-3 py-1 rounded text-sm ${active ? 'bg-white/20 text-white' : 'bg-white/10 text-white/80 hover:bg-white/20'} ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`;
                if (!disabled) btn.onclick = () => this.setActivityPage(page);
                return btn;
            };

            const prev = makeBtn('Prev', this.data.activityPage - 1, this.data.activityPage <= 1);
            container.appendChild(prev);

            const maxButtons = 5;
            let start = Math.max(1, this.data.activityPage - 2);
            let end = Math.min(totalPages, start + maxButtons - 1);
            if (end - start < maxButtons - 1) {
                start = Math.max(1, end - maxButtons + 1);
            }

            for (let i = start; i <= end; i++) {
                container.appendChild(makeBtn(String(i), i, false, i === this.data.activityPage));
            }

            const next = makeBtn('Next', this.data.activityPage + 1, this.data.activityPage >= totalPages);
            container.appendChild(next);
        },

                Object.values(byDay).forEach(info => {

                const sessionHeaders = [];
                for (let i = 1; i <= maxSessions; i++) {

                    const info = byDay[key] || { sessions: [], totalHours: 0, missingClockOut: false, deductionNote: '' };
