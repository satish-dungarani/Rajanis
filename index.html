        // Build sessions per day for a given employee + week.
        // Sessions are pairs of: Clocked In -> next Clocked Out / Auto Clock Out.
        // Supports multiple sessions in the same day.
        getWeeklySessionsForEmployee(empId, weekStart) {
            const emp = this.data.employees.find(e => e.id === empId);
            const byDay = {};
            if (!emp) return byDay;

            for (let i = 0; i < 7; i++) {
                const day = new Date(weekStart);
                day.setDate(day.getDate() + i);
                const dayStart = new Date(day);
                dayStart.setHours(0, 0, 0, 0);
                const dayEnd = new Date(dayStart);
                dayEnd.setDate(dayEnd.getDate() + 1);

                const dayRecords = this.data.history
                    .filter(h => h.employeeId === empId)
                    .filter(h => {
                        const t = new Date(h.timestamp);
                        return t >= dayStart && t < dayEnd;
                    })
                    .slice()
                    .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                    let openIn = null;
                    let missingClockOut = false;
                    let deductionMinutes = 0;
                    const sessions = [];

                    for (const r of dayRecords) {
                        if (r.action === 'Clocked In') {
                            if (!openIn) openIn = new Date(r.timestamp);
                        } else if (r.action === 'Clocked Out' || r.action === 'Auto Clock Out (System)') {
                            if (openIn) {
                                const out = new Date(r.timestamp);
                                if (out > openIn) sessions.push({ in: openIn, out });
                                openIn = null;
                            }
                        }
                    }

                    // If still clocked in today, show an in-progress session
                    if (openIn && emp.status === 'in' && day.toDateString() === new Date().toDateString()) {
                        sessions.push({ in: openIn, out: null, inProgress: true });
                    }

                    // Missing clock-out rule: if any open session exists, mark missing (no hours counted)
                    if (sessions.some(s => !s.out)) {
                        missingClockOut = true;
                    }

                    let totalHours = 0;

                    if (!missingClockOut) {
                        sessions.forEach(session => {
                            if (!session.out) return;
                            let sessionHours = Math.max(0, (session.out - session.in) / (1000 * 60 * 60));
                            if (sessionHours > 8) {
                                sessionHours = Math.max(0, sessionHours - 0.5);
                                deductionMinutes += 30;
                            }
                            totalHours += sessionHours;
                        });
                    }

                    const deductionNote = deductionMinutes > 0 ? `${deductionMinutes} min break deducted` : '';
                    byDay[day.toDateString()] = { sessions, totalHours, missingClockOut, deductionNote, deductionMinutes };

                // Store only for weekly/custom reports (NOT written to DB)
                const mapKey = `${empId}|${new Date(weekStart).toDateString()}`;
                this.data.photoMap[mapKey] = this.data.photoMap[mapKey] || {};
                this.data.photoMap[mapKey][day.toDateString()] = (dayRecords || []).map(r => r.verificationPhoto).filter(Boolean);
            }

            return byDay;
        },

        buildWeeklyReportData(emp, weekStart) {
            const rows = [];
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const byDay = this.getWeeklySessionsForEmployee(emp.id, weekStart);
            let totalHours = 0;
            let maxSessions = 0;

            for (let i = 0; i < 7; i++) {
                const day = new Date(weekStart);
                day.setDate(day.getDate() + i);
                const key = day.toDateString();
                const info = byDay[key] || { sessions: [], totalHours: 0, missingClockOut: false, deductionNote: '' };
                const isOff = (emp.offDays || []).includes(i);
                const dayLabel = `${dayNames[i]}, ${this.formatDate(day)}`;
                const sessionsCount = info.sessions.length;
                maxSessions = Math.max(maxSessions, sessionsCount);

                const sessionsHtml = sessionsCount
                    ? info.sessions
                        .map(s => `${this.formatTime(s.in)}-${s.out ? this.formatTime(s.out) : '<span class="badge-amber px-2 py-0.5 rounded text-xs">In Progress</span>'}`)
                        .join(' <span class="text-white/30">|</span> ')
                    : '<span class="text-white/40">-</span>';

                let hoursDisplay = '<span class="text-white/40">-</span>';
                if (!info.missingClockOut) {
                    const hoursVal = info.totalHours.toFixed(2);
                    hoursDisplay = `<span class="${info.totalHours >= 8 ? 'text-green-400' : 'text-white/70'} font-mono">${hoursVal}</span>`;
                    totalHours += info.totalHours;
                }

                let noteHtml = '<span class="text-white/30 text-xs">-</span>';
                let noteText = '';
                if (info.missingClockOut) {
                    noteHtml = '<span class="text-red-400 text-xs">Missing clock-out</span>';
                    noteText = 'Missing clock-out';
                } else if (info.deductionNote) {
                    noteHtml = `<span class="text-amber-400 text-xs">${info.deductionNote}</span>`;
                    noteText = info.deductionNote;
                }

                rows.push({
                    dayLabel,
                    dayPlain: `${dayNames[i]} ${this.formatDate(day)}`,
                    sessionsHtml,
                    notesHtml: noteHtml,
                    noteText,
                    hoursDisplay,
                    hoursValue: info.missingClockOut ? '' : info.totalHours.toFixed(2),
                    rowClass: isOff ? 'bg-amber-500/10' : '',
                    offBadge: isOff ? '<span class="badge-amber px-2 py-0.5 rounded text-xs ml-2">OFF</span>' : '',
                    info,
                    dayDate: day,
                    isOff
                });
            }

            return { rows, totalHours, maxSessions };
        },

        validateCustomDates() {
            const start = document.getElementById('custom-start-date')?.value;
            const end = document.getElementById('custom-end-date')?.value;
            const err = document.getElementById('custom-date-error');
            if (!start || !end) {

            }

            const e = new Date(end);

        generateCustomReport() {
            const empIdRaw = document.getElementById('custom-emp-id')?.value;
            const startVal = document.getElementById('custom-start-date')?.value;
            const endVal = document.getElementById('custom-end-date')?.value;
            if (!empIdRaw) { this.uiAlert('Please select an employee.'); return; }
            if (!startVal || !endVal) { this.uiAlert('Please select Start and End dates.'); return; }
            if (!this.validateCustomDates()) return;

            const startDate = new Date(startVal);
            const endDate = new Date(endVal);
            startDate.setHours(0,0,0,0);
            endDate.setHours(0,0,0,0);

            let employees = [];
            if (empIdRaw === 'all') {
                employees = this.data.employees.filter(e => e.active !== false);
            } else {
                const emp = this.data.employees.find(e => e.id === parseInt(empIdRaw));
                if (!emp) { this.uiAlert('Employee not found.'); return; }
                employees = [emp];
            }

            const tbody = document.getElementById('custom-report-table');
            const container = document.getElementById('custom-report-container');
            const exportBtn = document.getElementById('custom-export-btn');
            if (!tbody || !container || !exportBtn) return;
            tbody.innerHTML = '';

            let grandTotal = 0;

            // Loop weeks from start to end (inclusive)
            for (let e = 0; e < employees.length; e++) {
                const emp = employees[e];
                tbody.innerHTML += `<tr class="bg-white/5">
                    <td colspan="5" class="px-4 py-2 font-semibold text-white">${emp.name} <span class="text-white/40 text-xs">(${emp.role || '-'})</span></td>
                </tr>`;

                let empTotal = 0;
                let cursor = new Date(startDate);
                while (cursor <= endDate) {
                    const weekStart = new Date(cursor);
                    const weekEnd = new Date(weekStart);
                    weekEnd.setDate(weekEnd.getDate() + 6);

                    const { rows, totalHours } = this.buildWeeklyReportData(emp, weekStart);
                    empTotal += totalHours;

                    tbody.innerHTML += `<tr class="bg-white/5">
                        <td colspan="5" class="px-4 py-2 text-white/60 text-xs">Week: ${this.formatDate(weekStart)} - ${this.formatDate(weekEnd)}</td>
                    </tr>`;

                    rows.forEach(r => {
                        tbody.innerHTML += `<tr>
                            <td class="px-4 py-3 text-white/40">${''}</td>
                            <td class="px-4 py-3">${r.dayLabel}${r.offBadge}</td>
                            <td class="px-4 py-3 text-white/80">${r.sessionsHtml}</td>
                            <td class="px-4 py-3">${r.notesHtml}</td>
                            <td class="px-4 py-3 text-right">${r.hoursDisplay}</td>
                        </tr>`;
                    });

                    cursor.setDate(cursor.getDate() + 7);
                }

                grandTotal += empTotal;
                tbody.innerHTML += `<tr class="border-t border-white/10">
                    <td colspan="4" class="px-4 py-2 text-right text-white/60">Employee Total</td>
                    <td class="px-4 py-2 text-right font-semibold text-green-400">${empTotal.toFixed(2)}</td>
                </tr>`;
            }

            document.getElementById('custom-report-total').textContent = grandTotal.toFixed(2);
            container.classList.remove('hidden');
            exportBtn.classList.remove('hidden');
        },

        exportCustomReportExcel() {
            const startVal = document.getElementById('custom-start-date')?.value;
            const endVal = document.getElementById('custom-end-date')?.value;
            const empIdRaw = document.getElementById('custom-emp-id')?.value;
            if (!startVal || !endVal || !empIdRaw) {
                this.uiToast('Generate the report first', 'error');
                return;
            }
            const startDate = new Date(startVal);
            const endDate = new Date(endVal);
            startDate.setHours(0, 0, 0, 0);
            endDate.setHours(0, 0, 0, 0);

            let employees = [];
            if (empIdRaw === 'all') {
                employees = this.data.employees.filter(e => e.active !== false);
            } else {
                const emp = this.data.employees.find(e => e.id === parseInt(empIdRaw));
                if (!emp) { this.uiToast('Employee not found', 'error'); return; }
                employees = [emp];
            }

            // Determine max sessions across all selected employees and all weeks in range
            let maxSessions = 0;
            const byEmpWeeks = new Map();
            employees.forEach(emp => {
                const weeks = [];
                let cursor = new Date(startDate);
                while (cursor <= endDate) {
                    const weekStart = new Date(cursor);
                    const byDay = this.getWeeklySessionsForEmployee(emp.id, weekStart);
                    Object.values(byDay).forEach(info => {
                        const c = (info.sessions || []).length;
                        if (c > maxSessions) maxSessions = c;
                    });
                    weeks.push({ weekStart, byDay });
                    cursor.setDate(cursor.getDate() + 7);
                }
                byEmpWeeks.set(emp.id, weeks);
            });
            maxSessions = Math.max(1, maxSessions);
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
                <style>
                    body { font-family: Arial, sans-serif; }
                    table { border-collapse: collapse; width: 100%; font-size: 12px; }
                    th, td { border: 1px solid #333; padding: 6px; text-align: left; }
                    th { background: #f1f5f9; font-weight: bold; }
                    .title { background: #dbe2ea; font-weight: bold; font-size: 14px; }
                    .employee { background: #cbd5e1; font-weight: bold; }
                    .week { background: #e5e7eb; font-weight: bold; color: #334155; }
                    .total { background: #F1A983; font-weight: bold; }
                    .note { color: #6b7280; font-size: 11px; }
                </style>
            </head><body>`;

            html += `<table>`;
            html += `<tr class="title"><th colspan="${(maxSessions * 2) + 4}">Custom Report</th></tr>`;
            html += `<tr class="week"><td colspan="${(maxSessions * 2) + 4}">Range: ${this.formatDate(startDate)} - ${this.formatDate(endDate)}</td></tr>`;
            html += `</table><br>`;

            employees.forEach(emp => {
                const weeks = byEmpWeeks.get(emp.id) || [];
                let empTotal = 0;

                html += `<table>`;
                html += `<tr class="employee"><td colspan="${(maxSessions * 2) + 4}">Employee: ${emp.name || '-'} (${emp.role || '-'})</td></tr>`;
                const sessionHeaders = [];
                for (let i = 1; i <= maxSessions; i++) {
                    sessionHeaders.push(`<th>In${i}</th><th>Out${i}</th>`);
                }
                html += `<tr><th>Day</th>${sessionHeaders.join('')}<th>Total Hours</th><th>Notes</th></tr>`;

                weeks.forEach(({ weekStart, byDay }) => {
                    const weekEnd = new Date(weekStart);
                    weekEnd.setDate(weekEnd.getDate() + 6);
                    html += `<tr class="week"><td colspan="${(maxSessions * 2) + 4}">Week: ${this.formatDate(weekStart)} - ${this.formatDate(weekEnd)}</td></tr>`;

                    for (let i = 0; i < 7; i++) {
                        const dayDate = new Date(weekStart);
                        dayDate.setDate(dayDate.getDate() + i);
                        const key = dayDate.toDateString();
                        const info = byDay[key] || { sessions: [], totalHours: 0, missingClockOut: false, deductionNote: '' };

                        const cells = [];
                        for (let s = 0; s < maxSessions; s++) {
                            const sess = info.sessions[s];
                            if (sess) {
                                cells.push(this.formatTime(sess.in));
                                cells.push(sess.out ? this.formatTime(sess.out) : 'In Progress');
                            } else {
                                cells.push('');
                                cells.push('');
                            }
                        }

                        const hours = info.missingClockOut ? '' : info.totalHours.toFixed(2);
                        const note = info.missingClockOut ? 'Missing clock-out' : (info.deductionNote || '');
                        if (!info.missingClockOut) empTotal += info.totalHours;

                        html += `<tr>`;
                        html += `<td>${dayNames[i]} ${this.formatDate(dayDate)}</td>`;
                        html += cells.map(c => `<td>${c}</td>`).join('');
                        html += `<td>${hours}</td>`;
                        html += `<td>${note}</td>`;
                        html += `</tr>`;
                    }
                });

                html += `<tr class="total"><td><strong>Total</strong></td>${Array(maxSessions * 2).fill('<td></td>').join('')}<td><strong>${empTotal.toFixed(2)}</strong></td><td></td></tr>`;
                html += `<tr><td class="note">Notes:</td><td colspan="${(maxSessions * 2) + 3}" class="note">Missing clock-out days are excluded from totals. Sessions over 8 hours deduct 30 minutes.</td></tr>`;
                html += `</table><br>`;
            });

            html += `</body></html>`;

            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `custom_report_${this.formatDate(startDate).replace(/\//g,'-')}_to_${this.formatDate(endDate).replace(/\//g,'-')}.xls`;
            a.click();
            URL.revokeObjectURL(url);
        },

        updateAdminPassword() {
            const oldPw = document.getElementById('admin-old-password')?.value.trim() || '';
            const newPw = document.getElementById('admin-new-password')?.value.trim() || '';
            const confirmPw = document.getElementById('admin-confirm-password')?.value.trim() || '';

            if (!oldPw || !newPw || !confirmPw) {
                this.uiAlert('Please fill in all password fields.');
                return;
            }
            if (!/^\d{4}$/.test(oldPw) || !/^\d{4}$/.test(newPw) || !/^\d{4}$/.test(confirmPw)) {
                this.uiAlert('Password must be exactly 4 digits.');
                return;
            }

            const stored = this.data.adminPasswordHash || btoa('1234');
            if (btoa(oldPw) !== stored) {
                this.uiAlert('Old password is incorrect.');
                return;
            }
            if (newPw !== confirmPw) {
                this.uiAlert('New password and confirmation do not match.');
                return;
            }

            if (this.data.supabase) {
                this.saveSupabaseSetting('adminPasswordHash', btoa(newPw));
                this.data.adminPasswordHash = btoa(newPw);
                this.uiToast('Admin password updated successfully', 'success');
                const oldEl = document.getElementById('admin-old-password');
                const newEl = document.getElementById('admin-new-password');
                const confEl = document.getElementById('admin-confirm-password');
                if (oldEl) oldEl.value = '';
                if (newEl) newEl.value = '';
                if (confEl) confEl.value = '';
            } else {
                this.uiAlert('Supabase not connected. Cannot update password.');
            }
        },

            // no-op for now; placeholder for future enhancements
        },

        cleanHistoryByDateRange() {
            const startVal = document.getElementById('clean-start-date')?.value;
            const endVal = document.getElementById('clean-end-date')?.value;
            if (!startVal || !endVal) {
                this.uiAlert('Please select both Start and End dates.');
                return;
            }
            const startDate = new Date(startVal);
            const endDate = new Date(endVal);
            startDate.setHours(0,0,0,0);
            endDate.setHours(23,59,59,999);

            if (endDate < startDate) {
                this.uiAlert('End date must be after Start date.');
                return;
            }

            const fourWeeksAgo = new Date();
            fourWeeksAgo.setDate(fourWeeksAgo.getDate() - 28);
            if (endDate > fourWeeksAgo) {
                this.uiAlert('You can only delete records older than 4 weeks. Please select an older date range.');
                return;
            }

            this.uiConfirm(
                'Delete Selected Range?',
                `This will permanently delete all clock records from ${this.formatDate(startDate)} to ${this.formatDate(endDate)}.`,
                () => {
                    const originalCount = this.data.history.length;
                    this.data.history = this.data.history.filter(h => {
                        const t = new Date(h.timestamp);
                        return t < startDate || t > endDate;
                    });
                    const deleted = originalCount - this.data.history.length;
                    this.saveData();
                    this.uiToast(`Deleted ${deleted} records.`, 'success');
                }
            );
        },

            });

        // CSV / IMPORT-EXPORT HELPERS
        exportWeeklyExcelForEmployee(emp, weekStart) {
            const tableHtml = this.renderWeeklyEmployeeExcel(emp, weekStart);
            const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
                <style>
                    body { font-family: Arial, sans-serif; }
                    table { border-collapse: collapse; width: 100%; font-size: 12px; margin-bottom: 16px; }
                    th, td { border: 1px solid #333; padding: 6px; text-align: left; }
                    th { background: #f1f5f9; font-weight: bold; }
                    .employee { background: #eef2ff; font-weight: bold; }
                    .note { color: #6b7280; font-size: 11px; }
                </style>
            </head><body>${tableHtml}</body></html>`;
            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);

        },

        exportCSV(type) {
            let csv = '';
            let filename = '';
            if (type === 'activity') {
                if (this.data.history.length === 0) {
                    this.uiToast('No data to export', 'error');
                    return;
                }
                csv = 'Date,Time,Employee,Role,Action\n';
                this.data.history.forEach(h => {
                    csv += `${this.formatDate(h.timestamp)},${this.formatTime(h.timestamp)},"${h.employeeName}","${h.employeeRole || ''}",${h.action}\n`;
                });
                filename = 'activity_log.csv';
            } else if (type === 'weekly') {
                const empId = parseInt(document.getElementById('weekly-emp-id')?.value);
                const dateVal = document.getElementById('weekly-date')?.value;
                const emp = this.data.employees.find(e => e.id === empId);
                if (!emp || !dateVal) return;

                const weekStart = this.getWeekStart(new Date(dateVal));
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);

                const byDay = this.getWeeklySessionsForEmployee(empId, weekStart);

                // Determine max sessions in week (for columns)
                let maxSessions = 0;
                Object.values(byDay).forEach(info => {
                    const count = (info.sessions || []).length;
                    if (count > maxSessions) maxSessions = count;
                });
                maxSessions = Math.max(1, maxSessions);

                const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                let totalHours = 0;

                // Build Excel (HTML) string
                let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
                    <style>
                        body { font-family: Arial, sans-serif; }
                        table { border-collapse: collapse; width: 100%; font-size: 12px; }
                        th, td { border: 1px solid #333; padding: 6px; text-align: left; }
                        th { background: #f1f5f9; font-weight: bold; }
                        .title { background: #e2e8f0; font-weight: bold; font-size: 14px; }
                        .employee { background: #eef2ff; font-weight: bold; }
                        .note { color: #6b7280; font-size: 11px; }
                    </style>
                </head><body>`;

                // Title + Week info
                html += `<table>`;
                html += `<tr class="title"><th colspan="${(maxSessions * 2) + 3}">Weekly Report</th></tr>`;
                html += `<tr class="employee"><td>Employee</td><td colspan="${(maxSessions * 2) + 2}">${emp.name}</td></tr>`;
                html += `<tr><td><strong>Week</strong></td><td colspan="${(maxSessions * 2) + 2}">${this.formatDate(weekStart)} - ${this.formatDate(weekEnd)}</td></tr>`;
                html += `<tr></tr>`;

                // Headers
                const sessionHeaders = [];
                for (let i = 1; i <= maxSessions; i++) {
                    sessionHeaders.push(`<th>In${i}</th><th>Out${i}</th>`);
                }
                html += `<tr><th>Day</th>${sessionHeaders.join('')}<th>Total Hours</th><th>Notes</th></tr>`;

                // Rows per day
                for (let i = 0; i < 7; i++) {
                    const dayDate = new Date(weekStart);
                    dayDate.setDate(dayDate.getDate() + i);
                    const key = dayDate.toDateString();
                    const info = byDay[key] || { sessions: [], totalHours: 0, missingClockOut: false, deductionNote: '' };

                    const cells = [];
                    for (let s = 0; s < maxSessions; s++) {
                        const sess = info.sessions[s];
                        if (sess) {
                            cells.push(this.formatTime(sess.in));
                            cells.push(sess.out ? this.formatTime(sess.out) : 'In Progress');
                        } else {
                            cells.push('');
                            cells.push('');
                        }
                    }

                    const dayHours = info.missingClockOut ? '' : info.totalHours.toFixed(2);
                    const note = info.missingClockOut ? 'Missing clock-out' : (info.deductionNote || '');
                    if (!info.missingClockOut) {
                        totalHours += info.totalHours;
                    }

                    html += `<tr>`;
                    html += `<td>${dayNames[i]} ${this.formatDate(dayDate)}</td>`;
                    html += cells.map(c => `<td>${c}</td>`).join('');
                    html += `<td>${dayHours}</td>`;
                    html += `<td>${note}</td>`;
                    html += `</tr>`;
                }

                // Total + Notes
                html += `<tr><td><strong>Total</strong></td>${Array(maxSessions * 2).fill('<td></td>').join('')}<td><strong>${totalHours.toFixed(2)}</strong></td><td></td></tr>`;
                html += `<tr><td class="note">Notes:</td><td colspan="${(maxSessions * 2) + 2}" class="note">Missing clock-out days are excluded from totals. Sessions over 8 hours deduct 30 minutes.</td></tr>`;
                html += `</table></body></html>`;

                const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `weekly_${emp.name.toLowerCase().replace(/\s+/g, '_')}.xls`;
                a.click();
                URL.revokeObjectURL(url);
                return;
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        },

        // Export weekly timesheets for ALL employees in a single CSV
        // Includes multiple in/out pairs per day (In1/Out1...InN/OutN) and total hours per employee.
        exportWeeklyAllEmployeesExcel() {
            const dateVal = document.getElementById('weekly-date')?.value;
            if (!dateVal) {
                this.uiToast('Please select a week date first', 'error');
                return;
            }
            if (!this.data.employees || this.data.employees.length === 0) {
                this.uiToast('No employees to export', 'error');
                return;
            }

            const weekStart = this.getWeekStart(new Date(dateVal));
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);

            const byEmp = new Map();
            let maxSessions = 0;

            this.data.employees.forEach(emp => {
                const byDay = this.getWeeklySessionsForEmployee(emp.id, weekStart);
                byEmp.set(emp.id, byDay);
                Object.values(byDay).forEach(info => {
                    const c = (info.sessions || []).length;
                    if (c > maxSessions) maxSessions = c;
                });
            });

            maxSessions = Math.max(1, maxSessions);

            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
                <style>
                    body { font-family: Arial, sans-serif; }
                    table { border-collapse: collapse; width: 100%; font-size: 12px; }
                    th, td { border: 1px solid #333; padding: 6px; text-align: left; }
                    th { background: #f1f5f9; font-weight: bold; }
                    .title { background: #e2e8f0; font-weight: bold; font-size: 14px; }
                    .employee { background: #eef2ff; font-weight: bold; }
                    .note { color: #6b7280; font-size: 11px; }
                </style>
            </head><body>`;

            this.data.employees.forEach(emp => {
                const byDay = byEmp.get(emp.id) || {};
                let empTotal = 0;

                html += `<table>`;
                html += `<tr class="employee"><td colspan="${(maxSessions * 2) + 4}">Employee: ${emp.name || '-'} (${emp.role || '-'})</td></tr>`;
                html += `<tr><td colspan="${(maxSessions * 2) + 4}">Week: ${this.formatDate(weekStart)} - ${this.formatDate(weekEnd)}</td></tr>`;

                const sessionHeaders = [];
                for (let i = 1; i <= maxSessions; i++) {
                    sessionHeaders.push(`<th>In${i}</th><th>Out${i}</th>`);
                }
                html += `<tr><th>Day</th>${sessionHeaders.join('')}<th>Total Hours</th><th>Notes</th></tr>`;

                for (let i = 0; i < 7; i++) {
                    const dayDate = new Date(weekStart);
                    dayDate.setDate(dayDate.getDate() + i);
                    const key = dayDate.toDateString();
                    const info = byDay[key] || { sessions: [], totalHours: 0, missingClockOut: false, deductionNote: '' };

                    const cells = [];
                    for (let s = 0; s < maxSessions; s++) {
                        const sess = info.sessions[s];
                        if (sess) {
                            cells.push(this.formatTime(sess.in));
                            cells.push(sess.out ? this.formatTime(sess.out) : 'In Progress');
                        } else {
                            cells.push('');
                            cells.push('');
                        }
                    }

                    const hours = info.missingClockOut ? '' : info.totalHours.toFixed(2);
                    const note = info.missingClockOut ? 'Missing clock-out' : (info.deductionNote || '');
                    if (!info.missingClockOut) empTotal += info.totalHours;

                    html += `<tr>`;
                    html += `<td>${dayNames[i]} ${this.formatDate(dayDate)}</td>`;
                    html += cells.map(c => `<td>${c}</td>`).join('');
                    html += `<td>${hours}</td>`;
                    html += `<td>${note}</td>`;
                    html += `</tr>`;
                }

                html += `<tr><td><strong>Total</strong></td>${Array(maxSessions * 2).fill('<td></td>').join('')}<td><strong>${empTotal.toFixed(2)}</strong></td><td></td></tr>`;
                html += `<tr><td class="note">Notes:</td><td colspan="${(maxSessions * 2) + 3}" class="note">Missing clock-out days are excluded from totals. Sessions over 8 hours deduct 30 minutes.</td></tr>`;
                html += `</table><br>`;
            });

            html += `</body></html>`;

            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `weekly_all_employees_${this.formatDate(weekStart).replace(/\//g,'-')}.xls`;
            a.click();
            URL.revokeObjectURL(url);
        },

        downloadEmployeesTemplate() {
            // Template columns (no extras)
            const headers = [
                'Id',
                'FullName',
                'Gender',
                'JobTitle',
                'Mobile',
                'Email',
                'OffDays',
                'Photo'
            ];
            const csv = headers.join(',') + '\n';
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'employees_template.csv';
            a.click();
            URL.revokeObjectURL(url);
        },

        exportEmployeesCSV() {
            if (!this.data.employees || this.data.employees.length === 0) {
                this.uiToast('No employees to export', 'error');
                return;
            }
            // Columns: Id, FullName, Gender, JobTitle, Mobile, Email, OffDays, Photo
            const headers = ['Id','FullName','Gender','JobTitle','Mobile','Email','OffDays','Photo'];
            const rows = this.data.employees.map(e => [
                e.id ?? '',
                this.csvEscape(e.name ?? ''),
                (e.gender ?? '').toLowerCase(),
                this.csvEscape(e.role ?? ''),
                e.mobile ?? '',
                e.email ?? '',
                (e.offDays || []).join(','),
                e.photo ?? ''
            ].join(','));
            const csv = headers.join(',') + '\n' + rows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'employees_export.csv';
            a.click();
            URL.revokeObjectURL(url);
        },

        csvEscape(val) {
            const s = String(val).replace(/"/g, '""');
            if (s.includes(',') || s.includes('\n') || s.includes('"')) {
                return '"' + s + '"';
            }
            return s;
        },

        openImportEmployeesModal() {
            const modal = document.getElementById('import-employees-modal');
            if (modal) modal.classList.remove('hidden');
        },
        closeImportEmployeesModal() {
            const modal = document.getElementById('import-employees-modal');
            if (modal) modal.classList.add('hidden');
            const input = document.getElementById('import-employees-file');
            if (input) input.value = '';
        },

        async handleImportEmployees() {
            const input = document.getElementById('import-employees-file');
            if (!input || !input.files || input.files.length === 0) {
                this.uiToast('Please select a CSV file', 'error');
                return;
            }
            const file = input.files[0];
            try {
                const text = await file.text();
                const { ok, employees, errors } = this.parseEmployeesCSV(text);
                if (!ok) {
                    this.uiAlert('Import failed. ' + (errors[0] || 'Please check your file.'));
                    return;
                }
                // Merge imported employees: assign new IDs for any missing/duplicate ids
                const existingIds = new Set(this.data.employees.map(e => e.id));
                let nextId = this.data.employees.length > 0 ? Math.max(...this.data.employees.map(e => e.id)) + 1 : 1;
                employees.forEach(emp => {
                    if (!emp.id || existingIds.has(emp.id)) {
                        emp.id = nextId++;
                    }
                    existingIds.add(emp.id);
                });
                this.data.employees = [...this.data.employees, ...employees];
                this.saveData();
                this.renderAdminEmployees();
                this.uiToast(`Imported ${employees.length} employees`, 'success');
                this.closeImportEmployeesModal();
            } catch (e) {
                console.error('Import error', e);
                this.uiAlert('Failed to import file');
            }
        },

        parseEmployeesCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
            if (lines.length === 0) return { ok: false, errors: ['Empty file'] };
            const header = lines[0].split(',').map(h => h.trim());
            const required = ['FullName','JobTitle'];
            const allowed = ['Id','FullName','Gender','JobTitle','Mobile','Email','OffDays','Photo'];
            const headerSet = new Set(header);
            const missing = required.filter(r => !headerSet.has(r));
            if (missing.length > 0) {
                return { ok: false, errors: ['Missing required columns: ' + missing.join(', ')] };
            }
            const employees = [];
            const errors = [];
            for (let i = 1; i < lines.length; i++) {
                const raw = lines[i];
                if (!raw.trim()) continue;
                const cols = this.parseCsvLine(raw);
                const obj = {};
                header.forEach((h, idx) => {
                    obj[h] = cols[idx] ?? '';
                });
                // Validation: FullName & JobTitle
                if (!obj.FullName || !obj.JobTitle) {
                    errors.push(`Row ${i+1}: FullName and JobTitle are required.`);
                    continue;
                }
                // Normalize fields
                const emp = {
                    id: obj.Id ? parseInt(obj.Id, 10) : undefined,
                    name: obj.FullName.trim(),
                    role: obj.JobTitle.trim(),
                    gender: (obj.Gender || '').toLowerCase() === 'female' ? 'female' : ( (obj.Gender || '').toLowerCase() === 'male' ? 'male' : '' ),
                    mobile: obj.Mobile?.trim() || '',
                    email: obj.Email?.trim() || '',
                    offDays: (obj.OffDays ? String(obj.OffDays).split(/[|,]/).map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n>=0 && n<=6) : []),
                    photo: obj.Photo?.trim() || ( (obj.Gender==='female') ? this.getDefaultAvatar('female') : this.getDefaultAvatar('male') ),
                    status: 'out',
                    lastAction: null
                };
                employees.push(emp);
            }
            return { ok: errors.length === 0, employees, errors };
        },

        parseCsvLine(line) {
            // Simple CSV parser supporting quoted fields with commas
            const result = [];
            let cur = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (inQuotes) {
                    if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
                    else if (ch === '"') { inQuotes = false; }
                    else { cur += ch; }
                } else {
                    if (ch === ',') { result.push(cur); cur=''; }
                    else if (ch === '"') { inQuotes = true; }
                    else { cur += ch; }
                }
            }
            result.push(cur);
            return result.map(s => s.trim());
        },

        // UI HELPERS
        uiToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            toast.className = `toast px-4 py-3 rounded-lg shadow-lg ${colors[type] || colors.info} text-white flex items-center gap-2`;
            const icons = { success: 'check-circle', error: 'x-circle', info: 'info' };
            toast.innerHTML = `<i data-lucide="${icons[type] || 'info'}" class="w-5 h-5"></i><span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 4000);
        },

        uiAlert(message) {
            this.uiConfirm(message, null, null, true);
        },

        uiConfirm(title, message, onConfirm, alertOnly = false) {
            const container = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="glass-card rounded-2xl p-6 w-full max-w-sm">
                    <h3 class="text-lg font-bold mb-2">${title}</h3>
                    ${message ? `<p class="text-white/60 text-sm mb-4">${message}</p>` : ''}
                    <div class="flex gap-3 ${alertOnly ? '' : 'mt-4'}">
                        ${alertOnly ? '' : '<button onclick="app.closeModal()" class="flex-1 py-2 bg-white/10 hover:bg-white/20 rounded-lg transition">Cancel</button>'}
                        <button onclick="app.${alertOnly ? 'closeModal' : 'confirmModal'}()" class="flex-1 py-2 ${alertOnly ? 'bg-blue-500 hover:bg-blue-600' : 'bg-red-500 hover:bg-red-600'} rounded-lg font-medium transition">${alertOnly ? 'OK' : 'Confirm'}</button>
                    </div>
                </div>
            `;
            container.classList.remove('hidden');
            this._modalCallback = onConfirm;
        },

        closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
            this._modalCallback = null;
        },

        showLoader(message = 'Processing...') {
            const loader = document.getElementById('global-loader');
            const text = document.getElementById('global-loader-text');
            if (text) text.textContent = message;
            if (loader) loader.classList.remove('hidden');
            lucide.createIcons();
        },

        hideLoader() {
            const loader = document.getElementById('global-loader');
            if (loader) loader.classList.add('hidden');
        },

        logError(source, error, context = {}) {
            const entry = {
                source,
                message: error?.message || String(error),
                stack: error?.stack || null,
                context,
                timestamp: new Date().toISOString()
            };
            console.error('AppError:', entry);
            this.data.errorLogs = this.data.errorLogs || [];
            this.data.errorLogs.push(entry);
            if (this.data.errorLogs.length > 200) this.data.errorLogs.shift();
            // Best-effort: store in Supabase (non-blocking)
            if (this.data.supabase) {
                this.data.supabase.from('error_logs').insert({
                    source: entry.source,
                    message: entry.message,
                    stack: entry.stack,
                    context: entry.context,
                    timestamp: entry.timestamp
                }).catch(() => {});
            }
        },

        confirmModal() {
            if (this._modalCallback) this._modalCallback();
            this.closeModal();
        }
    };

    // Hide dropdown when clicking outside
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('weekly-emp-dropdown');
        const search = document.getElementById('weekly-emp-search');
        if (dropdown && search && !dropdown.contains(e.target) && e.target !== search) {
            dropdown.classList.add('hidden');
        }
    });

    // Init
    document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
